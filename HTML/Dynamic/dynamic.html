<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dynamic.css">

</head>
<body>

<nav>
  <div class="nav-left"><a href="#" class="logo">Motion</a></div>
  <div class="nav-right">
    <a href="#" class="nav-link">Product</a>
    <a href="#" class="nav-link">Solutions</a>
    <a href="#" class="nav-link">Pricing</a>
    <a href="#" class="nav-link" style="border-left: 1px solid #eee; padding-left: 20px;">Log in</a>
  </div>
</nav>

<main class="hero">
  <div class="hero-container">
    <div class="hero-text-content">
      <h1 class="hero-title">Build something beautiful.</h1>
      <p class="hero-subtitle">Motion helps you and your team get more done with peace of mind.</p>
      <div class="hero-actions">
        <a href="#" class="btn btn-blue">Get Notion free</a>
        <a href="#" class="btn btn-outline">Request a demo</a>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="creativeCanvas"></canvas>
    </div>
  </div>

  <section class="trusted-by">
    <p class="trusted-title">TRUSTED BY TEAMS AT</p>
    <div class="logos">
      <span>affirm</span>
      <span>NETFLIX</span>
      <span>Pinterest</span>
      <span>Figma</span>
    </div>
  </section>
</main>

<script>
const canvas = document.getElementById('creativeCanvas');
const ctx = canvas.getContext('2d');

let frame = 0;

function drawNotionWindow(x, y, w, h, title) {
  ctx.save();
  ctx.translate(x, y);
  
  // Window Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.05)';
  ctx.shadowBlur = 20;
  
  // Main Body
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, 10);
  ctx.fill();
  ctx.stroke();
  
  // Header Line
  ctx.beginPath();
  ctx.moveTo(0, 30); ctx.lineTo(w, 30);
  ctx.stroke();
  
  // Window Controls
  ctx.fillStyle = '#000';
  for(let i=0; i<3; i++) {
    ctx.beginPath();
    ctx.arc(15 + i*15, 15, 3, 0, Math.PI*2);
    ctx.fill();
  }


  ctx.strokeStyle = '#eee';
  for(let i=0; i<3; i++) {
    ctx.beginPath();
    ctx.moveTo(15, 50 + i*15);
    ctx.lineTo(w - 15, 50 + i*15);
    ctx.stroke();
  }
  
  ctx.restore();
}

function drawUser(x, y, color) {
  ctx.save();
  ctx.translate(x, y);

  const bounce = Math.sin(frame * 0.05) * 10;
  ctx.translate(0, bounce);


  ctx.fillStyle = color;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();


  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-10, -5, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -5, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, 10, 8, 0, Math.PI); ctx.stroke();
  
  ctx.restore();
}

function drawSyncLines() {
  const time = frame * 0.02;
  ctx.setLineDash([5, 10]);
  ctx.lineDashOffset = -frame;
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1.5;
  

  ctx.beginPath();
  ctx.moveTo(canvas.width * 0.2, canvas.height * 0.4);
  ctx.quadraticCurveTo(canvas.width * 0.5, canvas.height * 0.2, canvas.width * 0.8, canvas.height * 0.5);
  ctx.stroke();
  ctx.setLineDash([]);
}

function animate() {
  frame++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  

  drawSyncLines();


  drawNotionWindow(canvas.width * 0.1, canvas.height * 0.35, 180, 140);
  drawNotionWindow(canvas.width * 0.55, canvas.height * 0.5, 200, 160);


  drawUser(canvas.width * 0.5, canvas.height * 0.3, '#FFD54F');
  drawUser(canvas.width * 0.85, canvas.height * 0.45, '#E1F5FE');

  requestAnimationFrame(animate);
}

function init() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}

window.addEventListener('resize', init);
init();
animate();
</script>

</body>
</html>
